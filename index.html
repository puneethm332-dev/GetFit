<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GET FIT — 90 Day Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SCREEN: WELCOME -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-bg"></div>
  <div class="welcome-content">
    <div class="brand">GET<span>FIT</span></div>
    <h1>90 DAYS.<br>REAL RESULTS.</h1>
    <p>A personalized calisthenics plan built around your body type, goals, and schedule. No gym required.</p>
    <button class="btn-primary" id="btn-start">START MY PLAN →</button>
    <div class="welcome-badges">
      <span>🧬 Body Type Analysis</span>
      <span>📅 90-Day Plan</span>
      <span>✅ Daily Tracking</span>
      <span>🏆 Milestones</span>
    </div>
  </div>
</div>

<!-- SCREEN: QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <button class="btn-back" id="btn-back">← Back</button>
    <div class="quiz-counter" id="quiz-counter">1 / 6</div>
  </div>
  <div class="quiz-bar-wrap"><div class="quiz-bar" id="quiz-bar"></div></div>
  <div class="quiz-body">
    <div class="quiz-step" id="quiz-step">STEP 01</div>
    <div class="quiz-question" id="quiz-question"></div>
    <div class="quiz-options" id="quiz-options"></div>
    <button class="btn-primary" id="btn-next" disabled>Continue →</button>
  </div>
</div>

<!-- SCREEN: APP (Plan / Today / Progress) -->
<div id="screen-app" class="screen">
  <!-- TAB: PLAN -->
  <div id="tab-plan" class="tab active">
    <div class="app-scroll" id="plan-scroll">
      <div id="plan-content"></div>
    </div>
  </div>
  <!-- TAB: TODAY -->
  <div id="tab-today" class="tab">
    <div class="app-scroll" id="today-scroll">
      <div id="today-content"></div>
    </div>
  </div>
  <!-- TAB: PROGRESS -->
  <div id="tab-progress" class="tab">
    <div class="app-scroll" id="progress-scroll">
      <div id="progress-content"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>PLAN</span>
    </button>
    <button class="nav-item" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>TODAY</span>
    </button>
    <button class="nav-item" data-tab="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>PROGRESS</span>
    </button>
  </nav>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
