<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GET FIT — 90 Day Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
/* ===== RESET & ROOT ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --lime: #C8F135;
  --lime-dim: rgba(200,241,53,0.12);
  --dark: #0D0D0D;
  --card: #1C1C1C;
  --card2: #242424;
  --border: #2E2E2E;
  --muted: #666;
  --text: #F0F0F0;
  --red: #FF4B3A;
}

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ===== SCREENS ===== */
.screen { display: none; height: 100vh; overflow: hidden; }
.screen.active { display: flex; flex-direction: column; }

/* ===== WELCOME ===== */
#screen-welcome { position: relative; align-items: center; justify-content: center; padding: 40px 28px; text-align: center; }
.welcome-bg {
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,241,53,0.08) 0%, transparent 70%),
              radial-gradient(ellipse at 80% 100%, rgba(200,241,53,0.05) 0%, transparent 60%);
}
.welcome-content { position: relative; z-index: 1; max-width: 420px; }
.brand { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 6px; color: var(--muted); margin-bottom: 24px; }
.brand span { color: var(--lime); }
#screen-welcome h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 12vw, 6rem); line-height: 0.9; margin-bottom: 20px; letter-spacing: 2px; }
#screen-welcome p { color: #999; font-size: 1rem; line-height: 1.6; margin-bottom: 36px; }
.welcome-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 28px; }
.welcome-badges span { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 0.75rem; color: #aaa; }

/* ===== BUTTONS ===== */
.btn-primary {
  display: block; width: 100%;
  background: var(--lime); color: var(--dark);
  border: none; border-radius: 6px;
  padding: 16px 24px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 3px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.btn-primary:hover { transform: translateY(-1px); opacity: 0.92; }
.btn-primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; transform: none; }

/* ===== QUIZ ===== */
#screen-quiz { background: var(--dark); }
.quiz-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.btn-back { background: none; border: none; color: #888; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; padding: 6px 0; }
.btn-back:hover { color: var(--text); }
.quiz-counter { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); }

.quiz-bar-wrap { height: 3px; background: #222; flex-shrink: 0; }
.quiz-bar { height: 100%; background: var(--lime); transition: width 0.4s ease; }

.quiz-body { flex: 1; overflow-y: auto; padding: 28px 20px 24px; display: flex; flex-direction: column; gap: 20px; max-width: 560px; margin: 0 auto; width: 100%; }
.quiz-step { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 4px; color: var(--lime); }
.quiz-question { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1.1; letter-spacing: 1px; }

.quiz-options { display: flex; flex-direction: column; gap: 10px; flex: 1; }

/* Standard option button */
.opt-btn {
  display: flex; align-items: center; gap: 14px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 18px;
  color: var(--text); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  text-align: left; width: 100%;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover { border-color: #555; }
.opt-btn.selected { border-color: var(--lime); background: var(--lime-dim); color: var(--lime); }
.opt-icon { font-size: 1.4rem; flex-shrink: 0; width: 32px; text-align: center; }
.opt-label { font-weight: 600; font-size: 0.9rem; }
.opt-desc { font-size: 0.75rem; color: #888; margin-top: 2px; }
.opt-btn.selected .opt-desc { color: rgba(200,241,53,0.6); }

/* Body type grid */
.body-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.bt-btn {
  display: flex; flex-direction: column; align-items: center;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 18px 10px;
  color: var(--text); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  text-align: center;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.bt-btn:hover { border-color: #555; }
.bt-btn.selected { border-color: var(--lime); background: var(--lime-dim); }
.bt-btn .bt-icon { font-size: 2rem; margin-bottom: 8px; }
.bt-btn .bt-name { font-weight: 700; font-size: 0.82rem; margin-bottom: 3px; }
.bt-btn .bt-desc { font-size: 0.68rem; color: #888; line-height: 1.3; }
.bt-btn.selected .bt-name { color: var(--lime); }

/* ===== APP ===== */
#screen-app { position: relative; }
.tab { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab.active { display: flex; }
.app-scroll { flex: 1; overflow-y: auto; padding: 20px 20px 90px; }

/* BOTTOM NAV */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; height: 64px;
  background: rgba(13,13,13,0.97); border-top: 1px solid var(--border);
  backdrop-filter: blur(10px); z-index: 50;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  background: none; border: none; color: var(--muted);
  font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 1px;
  cursor: pointer; transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item svg { width: 20px; height: 20px; }
.nav-item.active { color: var(--lime); }

/* ===== PLAN TAB ===== */
.plan-header { margin-bottom: 20px; }
.plan-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--lime); border-radius: 20px;
  padding: 6px 14px; margin-bottom: 14px;
  font-size: 0.8rem;
}
.plan-badge-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--lime); }
.plan-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1.05; margin-bottom: 6px; }
.plan-sub { font-size: 0.85rem; color: #999; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0 24px; }
.stat-box { background: var(--card); border-radius: 10px; padding: 14px; text-align: center; border: 1px solid var(--border); }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--lime); line-height: 1; }
.stat-lbl { font-size: 0.65rem; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }

.tips-card { background: var(--card); border-left: 3px solid var(--lime); border-radius: 0 10px 10px 0; padding: 14px 16px; margin-bottom: 24px; }
.tips-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--lime); letter-spacing: 3px; margin-bottom: 10px; }
.tip-row { font-size: 0.83rem; color: #ccc; padding: 5px 0; border-bottom: 1px solid var(--border); }
.tip-row:last-child { border-bottom: none; }

.section-title { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 3px; margin: 0 0 12px; text-transform: uppercase; }

.week-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.week-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.week-head:hover { background: var(--card2); }
.week-tag { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--lime); background: var(--lime-dim); border-radius: 4px; padding: 3px 8px; flex-shrink: 0; }
.week-name { flex: 1; font-weight: 600; font-size: 0.88rem; }
.week-phase { font-size: 0.72rem; color: var(--muted); }
.week-arrow { color: var(--muted); font-size: 0.8rem; transition: transform 0.25s; flex-shrink: 0; }
.week-card.open .week-arrow { transform: rotate(180deg); }
.week-body { display: none; padding: 0 16px 14px; }
.week-card.open .week-body { display: block; }

.day-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.day-row:last-child { border-bottom: none; }
.day-num {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  flex-shrink: 0; border: 1.5px solid var(--border);
}
.day-num.work { border-color: var(--lime); color: var(--lime); }
.day-num.rest { border-color: #333; color: #555; }
.day-type { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
.day-exercises { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.ex-chip { background: var(--card2); border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; color: #ccc; }
.rest-note { font-size: 0.75rem; color: var(--muted); }

/* ===== TODAY TAB ===== */
.today-header { margin-bottom: 20px; }
.today-meta { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 6px; }
.today-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; }
.streak-bar { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; }
.streak-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--lime); }
.streak-lbl { font-size: 0.7rem; color: var(--muted); }
.streak-icon { font-size: 2rem; }

.workout-card { background: linear-gradient(135deg, var(--card), #1a2000); border: 1.5px solid var(--lime); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
.wk-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--lime); letter-spacing: 3px; margin-bottom: 6px; }
.wk-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; margin-bottom: 4px; }
.wk-sub { font-size: 0.8rem; color: #aaa; margin-bottom: 18px; }

.ex-row {
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px 14px;
  margin-bottom: 8px; cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.ex-row.done { border-color: var(--lime); background: var(--lime-dim); }
.ex-chk {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid #444; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 0.8rem; color: transparent;
  transition: all 0.2s;
}
.ex-row.done .ex-chk { background: var(--lime); border-color: var(--lime); color: var(--dark); }
.ex-text { flex: 1; }
.ex-name { font-weight: 600; font-size: 0.88rem; }
.ex-row.done .ex-name { color: var(--lime); }
.ex-sets { font-size: 0.75rem; color: var(--muted); }

.rest-day-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 32px 20px; text-align: center; margin-bottom: 20px; }
.rest-icon { font-size: 3rem; margin-bottom: 12px; }
.rest-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; margin-bottom: 6px; }
.rest-sub { font-size: 0.85rem; color: #999; }

.done-card { background: var(--lime-dim); border: 1.5px solid var(--lime); border-radius: 14px; padding: 28px 20px; text-align: center; margin-bottom: 20px; }
.done-icon { font-size: 3rem; margin-bottom: 10px; }
.done-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--lime); margin-bottom: 6px; }
.done-sub { font-size: 0.85rem; color: #aaa; }

.calendar-wrap { margin-top: 4px; }
.cal-days-hdr { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
.cal-hdr-cell { text-align: center; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); padding: 4px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-cell {
  aspect-ratio: 1; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  border: 1.5px solid transparent;
}
.cal-cell.empty { background: transparent; }
.cal-cell.future { background: #1a1a1a; color: #444; }
.cal-cell.completed { background: var(--lime-dim); border-color: var(--lime); color: var(--lime); }
.cal-cell.rest-day { background: rgba(255,75,58,0.08); border-color: rgba(255,75,58,0.2); color: rgba(255,75,58,0.6); }
.cal-cell.today-cell { background: var(--lime); color: var(--dark); font-weight: 700; border-color: var(--lime); }
.cal-cell.missed { background: rgba(255,75,58,0.1); border-color: rgba(255,75,58,0.15); color: rgba(255,75,58,0.5); }

/* ===== PROGRESS TAB ===== */
.ring-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
.ring-svg { overflow: visible; }
.ring-stats { display: flex; gap: 32px; margin-top: 14px; }
.ring-stat { text-align: center; }
.ring-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--lime); display: block; }
.ring-stat-lbl { font-size: 0.7rem; color: var(--muted); }

.phase-bars { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
.phase-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--lime); letter-spacing: 2px; margin-bottom: 14px; }
.pbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.pbar-row:last-child { margin-bottom: 0; }
.pbar-name { font-size: 0.78rem; color: #aaa; width: 72px; flex-shrink: 0; }
.pbar-track { flex: 1; height: 8px; background: #2a2a2a; border-radius: 4px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--lime); border-radius: 4px; transition: width 0.8s ease; }
.pbar-val { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--lime); width: 40px; text-align: right; }

.milestone-list { display: flex; flex-direction: column; gap: 8px; }
.ms-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
}
.ms-item.earned { border-color: var(--lime); }
.ms-icon-wrap { font-size: 1.6rem; flex-shrink: 0; }
.ms-info { flex: 1; }
.ms-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 2px; }
.ms-desc { font-size: 0.73rem; color: var(--muted); }
.ms-badge { font-family: 'Space Mono', monospace; font-size: 0.62rem; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
.ms-item.earned .ms-badge { background: var(--lime-dim); color: var(--lime); }
.ms-item:not(.earned) .ms-badge { background: #222; color: #555; }

.transform-card { background: linear-gradient(135deg, #1a2000, var(--card)); border: 2px solid var(--lime); border-radius: 14px; padding: 28px; text-align: center; margin-top: 20px; }
.transform-icon { font-size: 3rem; margin-bottom: 12px; }
.transform-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--lime); margin-bottom: 8px; }
.transform-sub { font-size: 0.85rem; color: #aaa; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--lime); color: var(--dark);
  padding: 11px 24px; border-radius: 30px;
  font-weight: 700; font-size: 0.85rem;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

</style>
</head>
<body>

<!-- SCREEN: WELCOME -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-bg"></div>
  <div class="welcome-content">
    <div class="brand">GET<span>FIT</span></div>
    <h1>90 DAYS.<br>REAL RESULTS.</h1>
    <p>A personalized calisthenics plan built around your body type, goals, and schedule. No gym required.</p>
    <button class="btn-primary" id="btn-start">START MY PLAN →</button>
    <div class="welcome-badges">
      <span>🧬 Body Type Analysis</span>
      <span>📅 90-Day Plan</span>
      <span>✅ Daily Tracking</span>
      <span>🏆 Milestones</span>
    </div>
  </div>
</div>

<!-- SCREEN: QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <button class="btn-back" id="btn-back">← Back</button>
    <div class="quiz-counter" id="quiz-counter">1 / 6</div>
  </div>
  <div class="quiz-bar-wrap"><div class="quiz-bar" id="quiz-bar"></div></div>
  <div class="quiz-body">
    <div class="quiz-step" id="quiz-step">STEP 01</div>
    <div class="quiz-question" id="quiz-question"></div>
    <div class="quiz-options" id="quiz-options"></div>
    <button class="btn-primary" id="btn-next" disabled>Continue →</button>
  </div>
</div>

<!-- SCREEN: APP (Plan / Today / Progress) -->
<div id="screen-app" class="screen">
  <!-- TAB: PLAN -->
  <div id="tab-plan" class="tab active">
    <div class="app-scroll" id="plan-scroll">
      <div id="plan-content"></div>
    </div>
  </div>
  <!-- TAB: TODAY -->
  <div id="tab-today" class="tab">
    <div class="app-scroll" id="today-scroll">
      <div id="today-content"></div>
    </div>
  </div>
  <!-- TAB: PROGRESS -->
  <div id="tab-progress" class="tab">
    <div class="app-scroll" id="progress-scroll">
      <div id="progress-content"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>PLAN</span>
    </button>
    <button class="nav-item" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>TODAY</span>
    </button>
    <button class="nav-item" data-tab="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>PROGRESS</span>
    </button>
  </nav>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
//  GET FIT — 90 Day Challenge  |  app.js
// ============================================================

// ---------- STATE ----------
var state = {};

function loadState() {
  try {
    var s = localStorage.getItem('getfit90_v2');
    state = s ? JSON.parse(s) : {};
  } catch (e) {
    state = {};
  }
  if (!state.answers)       state.answers = {};
  if (!state.completed)     state.completed = {};
  if (!state.startDate)     state.startDate = null;
  if (!state.plan)          state.plan = null;
}

function saveState() {
  try { localStorage.setItem('getfit90_v2', JSON.stringify(state)); } catch(e){}
}

// ---------- DATA ----------
var BODY_TYPES = {
